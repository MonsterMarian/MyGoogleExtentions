<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PromoSkiper AI Settings</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --card: #1e1e1e;
      --accent: #ff0000;
      --text: #ffffff;
      --text-dim: #aaaaaa;
    }
    body {
      width: 300px;
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
    }
    h2 { margin-top: 0; font-weight: 500; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
    h2 span { color: var(--accent); }
    .group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-dim); }
    input[type="text"] {
      width: calc(100% - 20px);
      background: var(--card);
      border: 1px solid #333;
      color: white;
      padding: 10px;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus { border-color: var(--accent); }
    button {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.3s, transform 0.1s;
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    .status { margin-top: 10px; font-size: 0.8rem; text-align: center; height: 1.2em; }
    .footer { font-size: 0.7rem; color: var(--text-dim); text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <h2><span>Promo</span>Skiper AI</h2>
  <div class="group">
    <label for="apiKey">Gemini API Key</label>
    <input type="text" id="apiKey" placeholder="AI za tebe přeskočí proma...">
  </div>
  <button id="saveBtn">Uložit Nastavení</button>
  <div class="status" id="status"></div>
  <div class="footer">Automaticky detekuje a přeskakuje sponzory, intra a proma.</div>
  <script src="popup.js"></script>
</body>
</html>
