<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 16px;
            width: 320px;
        }
        h2 {
            margin-top: 0;
            color: #58a6ff;
            text-align: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-box {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .stat-box.approved {
            border-color: rgba(63, 185, 80, 0.4);
        }
        .stat-box.rejected {
            border-color: rgba(248, 81, 73, 0.4);
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .stat-box.approved .stat-value {
            color: #3fb950;
        }
        .stat-box.rejected .stat-value {
            color: #f85149;
        }
        .stat-label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
        }
        .btn-settings {
            display: block;
            width: 100%;
            background-color: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-settings:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }
        
    </style>
</head>
<body>

    <h2>Deník Produktivity</h2>
    
    <div class="stats-grid">
        <div class="stat-box approved">
            <div class="stat-value" id="count-approved">0</div>
            <div class="stat-label">Povoleno</div>
        </div>
        <div class="stat-box rejected">
            <div class="stat-value" id="count-rejected">0</div>
            <div class="stat-label">Zamítnuto</div>
        </div>
    </div>

    <button id="open-settings" class="btn-settings">⚙️ Nastavení (Cíle & AI)</button>

    <script src="popup.js"></script>
</body>
</html>
